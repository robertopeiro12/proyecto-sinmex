name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint --workspace=apps/backend

      - name: Build
        run: npm run build --workspace=apps/backend

      - name: Test
        run: npm test --workspace=apps/backend
